services:
  - type: web
    name: godslink-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false # User will input their Neon Database URL in Render dashboard
      - key: JWT_SECRET
        generateValue: true # Generates a secure random JWT secret automatically
